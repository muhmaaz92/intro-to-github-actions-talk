name: Demo 06 - Star The Repo (Simplified)

on:
  workflow_dispatch:
  watch:
    types:
      - started

jobs:
  change-the-virtual-bulb:
    name: Generate Random Bulb Color
    runs-on: ubuntu-latest
    
    steps:
      - name: Find Random Color
        id: find-random-color
        run: |
          # Generate a random number 1-9
          RN=$(( $RANDOM % 9 + 1 ))
          case $RN in
            1) COLOR="white" ;;
            2) COLOR="red" ;;
            3) COLOR="orange" ;;
            4) COLOR="yellow" ;;
            5) COLOR="cyan" ;;
            6) COLOR="green" ;;
            7) COLOR="blue" ;;
            8) COLOR="purple" ;;
            9) COLOR="pink" ;;
            *) COLOR="black" ;;
          esac

          echo "bulbcolor=$COLOR" >> $GITHUB_OUTPUT
          echo "Selected Color: $COLOR"

      - name: Display Virtual Bulb
        run: |
          # This writes directly to the GitHub Actions Job Summary page
          echo "## 🌟 Repo Starred!" >> $GITHUB_STEP_SUMMARY
          echo "### The Virtual Bulb is now: **${{ steps.find-random-color.outputs.bulbcolor }}**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Using a dynamic badge as a visual "bulb"
          echo "![Bulb](https://img.shields.io/badge/VIRTUAL_BULB-${{ steps.find-random-color.outputs.bulbcolor }}-informational?style=for-the-badge&logo=lightbulb)" >> $GITHUB_STEP_SUMMARY
          
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "Action triggered at: $(date)" >> $GITHUB_STEP_SUMMARY
