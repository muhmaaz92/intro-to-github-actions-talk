name: Demo 05 - Push To Main

on:
  workflow_dispatch:
  push:
    branches: 
      - main

jobs:
  build-app:
    name: "Build App"
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      
    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    
    - name: Install dependencies
      run: dotnet restore "${{ github.workspace }}/mywebapp/mywebapp.sln"
    
    - name: Build
      run: dotnet build "${{ github.workspace }}/mywebapp/mywebapp.sln" --configuration Release --no-restore
    
    - name: Test
      run: |
        dotnet test "${{ github.workspace }}/mywebapp/mywebapp.sln" --no-restore --verbosity normal --logger "trx;LogFileName=test-results.trx"

    - name: Test Report
      uses: dorny/test-reporter@v1.9.1
      if: success() || failure()
      with:
        name: XUnit Tests
        path: "**/test-results.trx"
        reporter: dotnet-trx
      
    - name: Publish
      # We publish to a guaranteed absolute path called 'final_output'
      run: dotnet publish "${{ github.workspace }}/mywebapp/src/mywebapp.csproj" -c Release -o "${{ github.workspace }}/final_output"
    
    - name: Upload a Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: mywebappbuildartifacts
        # This MUST match the -o path above exactly
        path: "${{ github.workspace }}/final_output/"
        if-no-files-found: error
        retention-days: 7

  deploy-DEV:
    name: "Deploy To Azure DEV env"
    runs-on: ubuntu-latest
    needs: build-app
    environment:
      name: 'DEMO05_DEV'
      url: 'https://mywebapp-maaz-dev-a2fxbybkgmhhd9hy.southeastasia-01.azurewebsites.net'

    steps:
    - name: 'Login via Azure CLI'
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    
    - name: Download a Build Artifact
      uses: actions/download-artifact@v4
      with:
        name: 'mywebappbuildartifacts'
        path: 'publish_temp'
   
    - name: 'Run Azure webapp deploy'
      uses: azure/webapps-deploy@v3
      with: 
        app-name: 'mywebapp-maaz'
        slot-name: 'dev'
        package: 'publish_temp'
        
  deploy-QA:
    name: "Deploy To Azure QA env"
    runs-on: ubuntu-latest
    needs: build-app
    environment:
      name: 'DEMO05_QA'
      url: 'https://mywebapp-maaz-qa-f6azd0eefncpazcf.southeastasia-01.azurewebsites.net'

    steps:
    - name: 'Login via Azure CLI'
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    
    - name: Download a Build Artifact
      uses: actions/download-artifact@v4
      with:
        name: 'mywebappbuildartifacts'
        path: 'publish_temp'
   
    - name: 'Run Azure webapp deploy'
      uses: azure/webapps-deploy@v3
      with: 
        app-name: 'mywebapp-maaz'
        slot-name: 'qa'
        package: 'publish_temp'
        
  deploy-PROD:
    name: "Deploy To Azure PROD env"
    runs-on: ubuntu-latest
    needs: [deploy-DEV, deploy-QA]
    environment:
      name: 'DEMO05_PROD'
      url: 'https://mywebapp-maaz-gva7g0a7b3hxdwht.southeastasia-01.azurewebsites.net'

    steps:
    - name: 'Login via Azure CLI'
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    
    - name: Download a Build Artifact
      uses: actions/download-artifact@v4
      with:
        name: 'mywebappbuildartifacts'
        path: 'publish_temp'
   
    - name: 'Run Azure webapp deploy'
      uses: azure/webapps-deploy@v3
      with: 
        app-name: 'mywebapp-maaz'
        package: 'publish_temp'
